<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; color: #16a34a; }
    .token-block { margin: 1rem 0; padding: 1rem; background: #f1f5f9; border-radius: 6px; font-size: 0.875rem; word-break: break-all; }
    .token-block summary { cursor: pointer; font-weight: 600; }
    pre { margin: 0.5rem 0 0; white-space: pre-wrap; }
    a { color: #2563eb; }
    button { padding: 0.5rem 1rem; background: #64748b; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #475569; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>
  <p>Auth correct. You are signed in.</p>
  <div id="jwt-section"></div>
  <p><button type="button" id="logout-btn">Log out</button></p>

  <script>
    document.getElementById("logout-btn").addEventListener("click", function () {
      sessionStorage.removeItem("idToken");
      sessionStorage.removeItem("accessToken");
      sessionStorage.removeItem("refreshToken");
      window.location.replace("/");
    });
    function decodeJwtPayload(token) {
      try {
        const parts = token.split(".");
        if (parts.length < 2) return null;
        return JSON.parse(atob(parts[1].replace(/-/g, "+").replace(/_/g, "/")));
      } catch {
        return null;
      }
    }

    const idToken = sessionStorage.getItem("idToken");
    const accessToken = sessionStorage.getItem("accessToken");
    const section = document.getElementById("jwt-section");

    if (idToken) {
      const payload = decodeJwtPayload(idToken);
      let html = "<div class=\"token-block\"><details open><summary>IdToken (decoded)</summary><pre>" + (payload ? JSON.stringify(payload, null, 2) : "invalid") + "</pre></details></div>";
      if (payload && payload["cognito:groups"]) {
        html += "<p><strong>Roles:</strong> " + payload["cognito:groups"].join(", ") + "</p>";
      }
      if (accessToken) {
        html += "<div class=\"token-block\"><details><summary>Access token (raw)</summary><pre>" + accessToken.slice(0, 120) + "…</pre></details></div>";
      }
      section.innerHTML = html;
    } else {
      section.innerHTML = "<p>No session. <a href=\"/\">Sign in</a>.</p>";
    }
  </script>
</body>
</html>
