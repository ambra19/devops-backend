openapi: 3.0.3
info:
  title: Attendance App API
  description: |
    REST API for the Attendance App — a serverless backend built with AWS Lambda,
    API Gateway (HTTP API), Cognito (JWT auth), and DynamoDB.

    ## Authentication
    All endpoints except `/auth/login` and `/auth/change-password` require a
    Bearer JWT token issued by AWS Cognito. Include it in the `Authorization` header:
    ```
    Authorization: Bearer <idToken>
    ```

    ## Roles
    The system has three roles: **admin**, **teacher**, and **student**.
    Each endpoint documents which roles are permitted.
  version: 1.0.0
  contact: {}

servers:
  - url: https://<api-id>.execute-api.eu-central-1.amazonaws.com
    description: AWS API Gateway (replace with your actual invoke URL)
  - url: http://localhost:5173
    description: Local dev

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito ID token obtained from /auth/login

  schemas:
    # ── Domain models ──────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        userID:
          type: string
          example: "example-user-id-1"
        name:
          type: string
          example: "Denisa"
        role:
          type: string
          enum: [student, teacher, admin]
        departmentID:
          type: string
          example: "dept-1"

    Course:
      type: object
      properties:
        courseID:
          type: string
          example: "course-4"
        name:
          type: string
          example: "Databases"
        departmentID:
          type: string
          example: "dept-1"

    CourseWithDepartment:
      type: object
      description: Course object enriched with the department name
      properties:
        courseID:
          type: string
          example: "course-4"
        name:
          type: string
          example: "Databases"
        departmentID:
          type: string
          example: "dept-1"
        departmentName:
          type: string
          example: "Computer Science"

    EnrolledCourse:
      type: object
      description: Course as returned in enrollment page data
      properties:
        courseID:
          type: string
          example: "course-1"
        courseName:
          type: string
          example: "Algorithms"
        departmentID:
          type: string
          example: "dept-1"

    EnrollmentPageData:
      type: object
      properties:
        enrolledCourses:
          type: array
          items:
            $ref: '#/components/schemas/EnrolledCourse'
        availableCourses:
          type: array
          items:
            $ref: '#/components/schemas/EnrolledCourse'
      example:
        enrolledCourses:
          - courseID: "course-1"
            courseName: "Algorithms"
            departmentID: "dept-1"
          - courseID: "course-4"
            courseName: "Computer Networks"
            departmentID: "dept-1"
        availableCourses:
          - courseID: "course-3"
            courseName: "Machine Learning"
            departmentID: "dept-1"

    Department:
      type: object
      properties:
        departmentID:
          type: string
          example: "dept-1"
        name:
          type: string
          example: "Computer Science"

    AttendanceRecord:
      type: object
      description: Attendance record as returned by the API (transformed from DB format)
      properties:
        course:
          type: string
          example: "Databases"
        date:
          type: string
          format: date
          example: "2026-03-16"
        presence:
          type: boolean
          example: true

    AttendanceEntry:
      type: object
      required: [studentName, presence, courseName, date]
      properties:
        studentName:
          type: string
          example: "Denisa"
        presence:
          type: boolean
          example: true
        courseName:
          type: string
          example: "Databases"
        date:
          type: string
          format: date
          example: "2026-03-22"

    StudentView:
      type: object
      description: Simplified student object returned in teacher endpoints
      properties:
        name:
          type: string
          example: "Denisa"
        department:
          type: string
          example: "Computer Science"

    # ── Auth responses ─────────────────────────────────────────────────────────
    TokenResponse:
      type: object
      properties:
        message:
          type: string
          example: "Signed in successfully."
        idToken:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string

    # ── Generic responses ──────────────────────────────────────────────────────
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operation completed successfully"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Descriptive error message"

  responses:
    Forbidden:
      description: Forbidden — insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Forbidden"
    Unauthorized:
      description: Unauthorized — missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Internal server error"

# ── Global security (overridden per-endpoint for public routes) ──────────────
security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication — public endpoints, no JWT required
  - name: Admin / Courses
    description: Course management — admin role only
  - name: Admin / Departments
    description: Department management — admin role only
  - name: Admin / Users
    description: User management — admin role only
  - name: Enrollments
    description: Course enrollment — student and admin roles
  - name: Attendance
    description: Attendance tracking — student and teacher roles
  - name: Teachers
    description: Teacher-specific views — teacher role only
  - name: Users
    description: User profile lookups — any authenticated role

paths:

  # ────────────────────────────────────────────────────────────────────────────
  # AUTH
  # ────────────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Authenticates a user with email and password using Cognito USER_PASSWORD_AUTH flow.
        Returns JWT tokens on success.

        If the user still has a temporary password, returns 400 and instructs the
        client to complete the change-password flow first.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "jane.doe@university.edu"
                password:
                  type: string
                  format: password
                  example: "MyPassword123!"
      responses:
        '200':
          description: Signed in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Temporary password still in use — must change password first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Temporary password in use. Use the change-password flow first."
        '401':
          description: Wrong email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Email or password is incorrect."
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Too many attempts. Try again later."
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Set permanent password (first login)
      description: |
        Used on first login when Cognito issues a temporary password.
        The user must supply their temporary password as `currentPassword` and
        choose a new permanent one.

        On success, the user is immediately signed in and tokens are returned.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, currentPassword, newPassword]
              properties:
                email:
                  type: string
                  format: email
                  example: "jane.doe@university.edu"
                currentPassword:
                  type: string
                  description: The temporary password received by the user
                  example: "TempPass123!"
                newPassword:
                  type: string
                  description: New permanent password (must meet Cognito policy)
                  example: "NewSecurePass456!"
      responses:
        '200':
          description: Password set and user signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                message: "Password set successfully. You are signed in."
        '400':
          description: Not in NEW_PASSWORD_REQUIRED state, or password does not meet requirements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Wrong email or temporary password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # ADMIN — COURSES
  # ────────────────────────────────────────────────────────────────────────────
  /admin/courses:
    get:
      tags: [Admin / Courses]
      summary: List all courses (with departments)
      description: Returns all courses in the system, each enriched with its department name. **Role required:** admin.
      responses:
        '200':
          description: List of courses with department info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseWithDepartment'
              example:
                - courseID: "course-1773699885486"
                  name: "biotech2"
                  departmentID: "dept-2"
                  departmentName: "Bio"
                - courseID: "course-4"
                  name: "Databases"
                  departmentID: "dept-1"
                  departmentName: "Computer Science"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Admin / Courses]
      summary: Create a course
      description: Creates a new course and assigns it to a department. **Role required:** admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, departmentId]
              properties:
                name:
                  type: string
                  example: "Cloud Computing"
                departmentId:
                  type: string
                  example: "dept-1"
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
              example:
                courseID: "course-1774194350234"
                name: "Cloud Computing"
                departmentID: "dept-1"
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "name and departmentId are required"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags: [Admin / Courses]
      summary: Rename a course
      description: |
        Updates the name of an existing course. **Role required:** admin.

        **Note:** The backend identifies courses by name, so duplicate course names could create ambiguity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseName, newName]
              properties:
                courseName:
                  type: string
                  example: "Databases"
                newName:
                  type: string
                  example: "Advanced Databases"
      responses:
        '200':
          description: Course renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Course renamed successfully"
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Admin / Courses]
      summary: Delete a course
      description: |
        Deletes an existing course from the system. **Role required:** admin.

        **Note:** This endpoint deletes a course by name, which assumes course names are unique.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseName]
              properties:
                courseName:
                  type: string
                  example: "Databases"
      responses:
        '200':
          description: Course deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Course deleted successfully"
        '400':
          description: Missing courseName
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # ADMIN — DEPARTMENTS
  # ────────────────────────────────────────────────────────────────────────────
  /admin/departments:
    get:
      tags: [Admin / Departments]
      summary: List all departments
      description: Returns all departments in the system. **Role required:** admin.
      responses:
        '200':
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
              example:
                - name: "Computer Science"
                  departmentID: "dept-1"
                - name: "Artificial Intelligence"
                  departmentID: "dept-1773699933044"
                - name: "Mathematics"
                  departmentID: "dept-1774195599364"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Admin / Departments]
      summary: Create a department
      description: Creates a new department. **Role required:** admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Computer Science"
      responses:
        '201':
          description: Department created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
              example:
                departmentID: "dept-1774195599364"
                name: "Mathematics"
        '400':
          description: Missing name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "name is required"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Admin / Departments]
      summary: Delete a department
      description: Deletes a department by ID. **Role required:** admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [departmentId]
              properties:
                departmentId:
                  type: string
                  example: "dept-1"
      responses:
        '200':
          description: Department deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Department deleted successfully"
        '400':
          description: Missing departmentId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/departments/{departmentId}:
    parameters:
      - name: departmentId
        in: path
        required: true
        description: Unique ID of the department
        schema:
          type: string
        example: "dept-1"

    patch:
      tags: [Admin / Departments]
      summary: Rename a department
      description: Updates the name of an existing department. **Role required:** admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Computer Engineering"
      responses:
        '200':
          description: Department renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Department renamed successfully"
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/departments/{departmentId}/courses:
    parameters:
      - name: departmentId
        in: path
        required: true
        description: Unique ID of the department
        schema:
          type: string
        example: "dept-1"

    get:
      tags: [Admin / Departments]
      summary: List courses by department
      description: Returns all courses belonging to a specific department. **Role required:** admin.
      responses:
        '200':
          description: List of courses in the department
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
              example:
                - courseID: "course-1774195754492"
                  name: "Cloud Computing"
                  departmentID: "dept-1"
                - courseID: "course-4"
                  name: "Databases"
                  departmentID: "dept-1"
        '400':
          description: Missing departmentId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Admin / Departments]
      summary: Add a course to a department
      description: Creates a new course within the given department. **Role required:** admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Cloud Computing"
      responses:
        '201':
          description: Course added to department
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
              example:
                courseID: "course-1774195754492"
                name: "Cloud Computing"
                departmentID: "dept-1"
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/departments/{departmentId}/courses/{courseName}:
    parameters:
      - name: departmentId
        in: path
        required: true
        description: Unique ID of the department
        schema:
          type: string
        example: "dept-1"
      - name: courseName
        in: path
        required: true
        description: Name of the course to remove
        schema:
          type: string
        example: "Databases"

    patch:
      tags: [Admin / Departments]
      summary: Remove a course from a department
      description: |
        Removes a course from a department. **Role required:** admin.

        **Note:** Although the route contains `departmentId`, the current implementation
        removes the course using `courseName` only.
      responses:
        '200':
          description: Course removed from department
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Course removed from department successfully"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # ADMIN — USERS
  # ────────────────────────────────────────────────────────────────────────────
  /admin/users/students:
    get:
      tags: [Admin / Users]
      summary: List all students
      description: Returns all users with the **student** role. **Role required:** admin.
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - departmentID: "dept-1"
                  role: "student"
                  name: "Denisa"
                  userID: "example-user-id-1"
                - departmentID: "dept-1"
                  role: "student"
                  name: "Karolina"
                  userID: "example-user-id-2"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/users/teachers:
    get:
      tags: [Admin / Users]
      summary: List all teachers
      description: Returns all users with the **teacher** role. **Role required:** admin.
      responses:
        '200':
          description: List of teachers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - departmentID: "dept-1"
                  role: "teacher"
                  name: "Rals"
                  userID: "example-test"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/users:
    patch:
      tags: [Admin / Users]
      summary: Rename a user
      description: |
        Updates the display name of an existing user. **Role required:** admin.

        **Note:** This endpoint looks up the user by name, then renames using their internal ID.
        This assumes names are unique.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentName, newName]
              properties:
                currentName:
                  type: string
                  example: "Karolina"
                newName:
                  type: string
                  example: "Karolina-student"
      responses:
        '200':
          description: User renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "User renamed successfully"
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # ADMIN — STUDENT VIEW
  # ────────────────────────────────────────────────────────────────────────────
  /admin/students/{studentId}/enrollments:
    parameters:
      - name: studentId
        in: path
        required: true
        description: The Cognito `sub` of the student
        schema:
          type: string
        example: "abc123"

    get:
      tags: [Admin / Users]
      summary: Get a student's enrollment data (admin view)
      description: Returns the enrolled and available courses for any student. **Role required:** admin.
      responses:
        '200':
          description: Enrollment page data for the student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentPageData'
              example:
                enrolledCourses:
                  - courseID: "course-4"
                    name: "Databases"
                    departmentID: "dept-1"
                  - courseID: "course-1773574137813"
                    name: "Algorithms Advanced"
                    departmentID: "dept-1"
                availableCourses:
                  - courseID: "course-1774195754492"
                    name: "Cloud Computing"
                    departmentID: "dept-1"
                  - courseID: "course-3"
                    name: "Machine Learning"
                    departmentID: "dept-1"
        '400':
          description: Missing studentId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # ENROLLMENTS
  # ────────────────────────────────────────────────────────────────────────────
  /students/{studentId}/enrollments:
    parameters:
      - name: studentId
        in: path
        required: true
        description: The Cognito `sub` of the student
        schema:
          type: string
        example: "abc123"

    get:
      tags: [Enrollments]
      summary: Get enrollment page data (student)
      description: |
        Returns the enrolled and available courses for the authenticated student.

        **Role required:** student.
        **Restriction:** a student can only fetch their own data (`studentId` must match their JWT `sub`).
      responses:
        '200':
          description: Enrollment page data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentPageData'
              example:
                enrolledCourses:
                  - courseID: "course-1"
                    courseName: "Algorithms"
                    departmentID: "dept-1"
                  - courseID: "course-4"
                    courseName: "Computer Networks"
                    departmentID: "dept-1"
                availableCourses:
                  - courseID: "course-3"
                    courseName: "Machine Learning"
                    departmentID: "dept-1"
        '400':
          description: Missing studentId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Enrollments]
      summary: Enroll in a course
      description: Creates a new enrollment for a student in a specific course. **Role required:** student or admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId:
                  type: string
                  example: "course-4"
      responses:
        '200':
          description: Enrolled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Enrolled successfully"
        '400':
          description: Missing studentId or courseId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Enrollments]
      summary: Unenroll from a course
      description: Removes a student's enrollment from a specific course. **Role required:** student or admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId:
                  type: string
                  example: "course-4"
      responses:
        '200':
          description: Unenrolled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Unenrolled successfully"
        '400':
          description: Missing studentId or courseId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # ATTENDANCE
  # ────────────────────────────────────────────────────────────────────────────
  /students/{studentId}/attendance:
    parameters:
      - name: studentId
        in: path
        required: true
        description: The Cognito `sub` of the student
        schema:
          type: string
        example: "abc123"

    get:
      tags: [Attendance]
      summary: Get attendance records for a student
      description: |
        Returns attendance records for the given student. **Role required:** student.

        The backend transforms the raw DynamoDB format (`studentID`, `date_courseID`, `presence`)
        into the API response format (`course`, `date`, `presence`).
      responses:
        '200':
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceRecord'
              example:
                - course: "Databases"
                  date: "2026-03-16"
                  presence: true
                - course: "Cloud Computing"
                  date: "2026-03-18"
                  presence: false
                - course: "Software Engineering"
                  date: "2026-03-22"
                  presence: true
        '400':
          description: Missing studentId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /teachers/attendance:
    post:
      tags: [Attendance]
      summary: Mark attendance for a course session
      description: |
        Marks attendance for one or more students in a course. **Role required:** teacher.

        The backend converts `studentName → studentID` and `courseName → courseID`
        before writing to DynamoDB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries]
              properties:
                entries:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/AttendanceEntry'
            example:
              entries:
                - studentName: "Denisa"
                  courseName: "Databases"
                  date: "2026-03-22"
                  presence: true
                - studentName: "Karolina"
                  courseName: "Databases"
                  date: "2026-03-22"
                  presence: false
      responses:
        '200':
          description: Attendance marked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Attendance marked successfully"
        '400':
          description: Missing or empty entries array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "entries are required"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # TEACHERS
  # ────────────────────────────────────────────────────────────────────────────
  /teachers/{teacherId}/courses:
    parameters:
      - name: teacherId
        in: path
        required: true
        description: The Cognito `sub` of the teacher
        schema:
          type: string
        example: "teacher-xyz"

    get:
      tags: [Teachers]
      summary: Get courses taught by a teacher
      description: Returns the list of course names assigned to the given teacher. **Role required:** teacher.
      responses:
        '200':
          description: List of course names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example:
                - "Databases"
                - "Algorithms"
                - "Machine Learning"
                - "Computer Networks 2"
        '400':
          description: Missing teacherId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /teachers/{teacherId}/courses/{courseName}/students:
    parameters:
      - name: teacherId
        in: path
        required: true
        schema:
          type: string
        example: "teacher-xyz"
      - name: courseName
        in: path
        required: true
        description: URL-encoded course name
        schema:
          type: string
        example: "Databases"

    get:
      tags: [Teachers]
      summary: Get students enrolled in a teacher's course
      description: Returns the list of students enrolled in the specified course. **Role required:** teacher.
      responses:
        '200':
          description: List of students, or a message if none are enrolled
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/StudentView'
                  - $ref: '#/components/schemas/MessageResponse'
              examples:
                students:
                  summary: Students found
                  value:
                    - name: "Denisa"
                      department: "Computer Science"
                    - name: "Karolina"
                      department: "Computer Science"
                noStudents:
                  summary: No students enrolled
                  value:
                    message: "No students enrolled"
        '400':
          description: Missing courseName
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Course not found: Database 2"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ────────────────────────────────────────────────────────────────────────────
  # USERS
  # ────────────────────────────────────────────────────────────────────────────
  /users/{userId}/name:
    parameters:
      - name: userId
        in: path
        required: true
        description: The Cognito `sub` of the user
        schema:
          type: string
        example: "abc123"

    get:
      tags: [Users]
      summary: Get a user's name
      description: Returns the display name of any user. **Role required:** student, teacher, or admin.
      responses:
        '200':
          description: User name
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: "Raluuuu"
        '400':
          description: Missing userId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{userId}/department:
    parameters:
      - name: userId
        in: path
        required: true
        description: The Cognito `sub` of the user
        schema:
          type: string
        example: "abc123"

    get:
      tags: [Users]
      summary: Get a user's department
      description: |
        Returns the department name of any user. **Role required:** student, teacher, or admin.

        **Note:** If the department is not found, the backend returns the department ID instead of the name.
      responses:
        '200':
          description: User department name
          content:
            application/json:
              schema:
                type: object
                properties:
                  department:
                    type: string
                    example: "Computer Science"
        '400':
          description: Missing userId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
